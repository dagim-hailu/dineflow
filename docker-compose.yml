version: '3.8'

services:
  # Database: PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: dineflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dineflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dineflow_password}
      POSTGRES_DB: ${POSTGRES_DB:-dineflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache: Redis
  redis:
    image: redis:7-alpine
    container_name: dineflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Object Storage: MinIO
  minio:
    image: minio/minio
    container_name: dineflow-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # NestJS API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dineflow-api
    restart: always
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-dineflow}:${POSTGRES_PASSWORD:-dineflow_password}@postgres:5432/${POSTGRES_DB:-dineflow}?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_password}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - minio

  # Next.js Web
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: dineflow-web
    restart: always
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001/graphql
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
